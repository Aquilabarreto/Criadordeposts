<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carrossel Maker — Posts X/Twitter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --ui-bg:#0a0b0d;
    --ui-panel:#111316;
    --ui-panel-2:#16181c;
    --ui-input:#1c1f24;
    --ui-border:#25282e;
    --ui-border-soft:#1e2126;
    --ui-text:#e7e9ea;
    --ui-text-dim:#8b929c;
    --ui-text-faint:#5b6169;
    --accent:#1d9bf0;
    --accent-hover:#1a8cd8;
    --danger:#f4212e;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--ui-bg);
    color:var(--ui-text);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}

  /* ---------- App shell ---------- */
  .app{display:flex;flex-direction:column;height:100vh}
  .topbar{
    height:56px;flex:0 0 56px;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;border-bottom:1px solid var(--ui-border);background:var(--ui-panel);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.2px}
  .brand .logo{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .brand .logo svg{width:17px;height:17px;fill:#fff}
  .topbar-actions{display:flex;align-items:center;gap:10px}

  .btn{
    display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border-radius:999px;
    font-size:14px;font-weight:600;transition:background .15s,opacity .15s,transform .05s;
  }
  .btn:active{transform:translateY(1px)}
  .btn svg{width:16px;height:16px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:var(--ui-input);color:var(--ui-text)}
  .btn-ghost:hover{background:#22262c}
  .btn[disabled]{opacity:.55;cursor:progress}

  .theme-seg{display:flex;background:var(--ui-input);border-radius:999px;padding:3px;gap:2px}
  .theme-seg button{height:32px;padding:0 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ui-text-dim);display:flex;align-items:center;gap:6px}
  .theme-seg button.active{background:var(--ui-panel-2);color:var(--ui-text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .theme-seg button svg{width:14px;height:14px}

  .workspace{flex:1;display:flex;min-height:0}

  /* ---------- Slides rail ---------- */
  .rail{
    width:190px;flex:0 0 190px;background:var(--ui-panel);border-right:1px solid var(--ui-border);
    display:flex;flex-direction:column;
  }
  .rail-head{padding:14px 14px 10px;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ui-text-faint)}
  .rail-list{flex:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:10px}
  .slide-chip{
    position:relative;border:1.5px solid var(--ui-border);border-radius:10px;overflow:hidden;
    aspect-ratio:1/1;background:#000;cursor:pointer;transition:border-color .15s;
  }
  .slide-chip.active{border-color:var(--accent)}
  .slide-chip .thumb{position:absolute;inset:0;pointer-events:none}
  .slide-chip .idx{
    position:absolute;top:5px;left:6px;font-size:11px;font-weight:700;background:rgba(0,0,0,.6);
    color:#fff;padding:1px 6px;border-radius:6px;z-index:2;
  }
  .slide-chip .del{
    position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;z-index:2;
    background:rgba(0,0,0,.55);color:#fff;display:none;align-items:center;justify-content:center;
  }
  .slide-chip:hover .del{display:flex}
  .slide-chip .del:hover{background:var(--danger)}
  .slide-chip .del svg{width:12px;height:12px;fill:currentColor}
  .add-slide{
    height:44px;border:1.5px dashed var(--ui-border);border-radius:10px;color:var(--ui-text-dim);
    font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;
  }
  .add-slide:hover{border-color:var(--accent);color:var(--accent)}

  /* ---------- Settings panel ---------- */
  .panel{
    width:340px;flex:0 0 340px;background:var(--ui-panel-2);border-right:1px solid var(--ui-border);
    overflow-y:auto;padding:18px 18px 60px;
  }
  .sect{margin-bottom:26px}
  .sect-title{font-size:13px;font-weight:800;letter-spacing:.2px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .sect-title .mini-link{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ui-text-dim);margin-bottom:7px}
  .row{display:flex;gap:10px}
  .row .field{flex:1}
  .inp,.sel{
    width:100%;height:40px;background:var(--ui-input);border:1px solid var(--ui-border-soft);
    border-radius:9px;color:var(--ui-text);padding:0 12px;font-size:14px;outline:none;transition:border-color .15s;
  }
  .inp:focus,.sel:focus{border-color:var(--accent)}
  textarea.inp{height:auto;min-height:96px;padding:10px 12px;resize:vertical;line-height:1.5}
  .inp.with-prefix{padding-left:30px}
  .prefix-wrap{position:relative}
  .prefix-wrap .pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ui-text-faint);font-size:14px}

  .switch{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
  .switch input{display:none}
  .switch .track{width:38px;height:22px;border-radius:999px;background:var(--ui-border);position:relative;transition:background .15s;flex:0 0 auto}
  .switch .track:after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s}
  .switch input:checked + .track{background:var(--accent)}
  .switch input:checked + .track:after{transform:translateX(16px)}
  .switch .lbl{font-size:13px;font-weight:600}

  .slider-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .slider-head span:first-child{font-size:12px;font-weight:600;color:var(--ui-text-dim)}
  .slider-head span:last-child{font-size:13px;font-weight:700;color:var(--accent)}
  input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:5px;background:var(--ui-border);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(29,155,240,.2)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}

  .file-btn{
    display:flex;align-items:center;gap:10px;height:40px;background:var(--ui-input);border:1px solid var(--ui-border-soft);
    border-radius:9px;padding:0 8px 0 12px;font-size:13px;color:var(--ui-text-dim);
  }
  .file-btn .pick{margin-left:auto;background:var(--accent);color:#fff;height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:700;display:flex;align-items:center}
  .file-btn.has-file{color:var(--ui-text)}
  .file-btn .clear{background:none;color:var(--ui-text-faint);padding:4px}
  .file-btn .clear:hover{color:var(--danger)}

  .block{
    background:var(--ui-input);border:1px solid var(--ui-border-soft);border-radius:10px;padding:12px;margin-bottom:12px;
  }
  .block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .block-head .tag{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ui-text-faint);display:flex;align-items:center;gap:6px}
  .block-head .tag svg{width:13px;height:13px;fill:var(--ui-text-faint)}
  .block-head .rm{color:var(--ui-text-faint);padding:3px}
  .block-head .rm:hover{color:var(--danger)}
  .block-head .rm svg{width:13px;height:13px;fill:currentColor}
  .add-block-row{display:flex;gap:10px;margin-top:4px}
  .add-block-row .btn-ghost{flex:1;justify-content:center;height:40px}
  .thumb-preview{width:100%;border-radius:8px;margin-top:8px;display:block;border:1px solid var(--ui-border-soft)}

  /* ---------- Stage ---------- */
  .stage{
    flex:1;min-width:0;display:flex;align-items:center;justify-content:center;position:relative;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.035) 1px, transparent 0) 0 0/22px 22px,
      #0d0e11;
    overflow:hidden;padding:32px;
  }
  .stage-label{position:absolute;top:16px;left:0;right:0;text-align:center;font-size:12px;font-weight:600;color:var(--ui-text-faint);letter-spacing:.3px}
  .canvas-wrap{transform-origin:center center;box-shadow:0 30px 80px rgba(0,0,0,.55);border-radius:2px}

  /* ============================================================
     THE POST CARD — faithful X/Twitter rendering
     ============================================================ */
  .card{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI Variable Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;justify-content:center;
    padding:72px 74px;
  }
  .card[data-theme="dark"]{
    --c-bg:#000000; --c-text:#e7e9ea; --c-dim:#71767b; --c-blue:#1d9bf0; --c-border:#2f3336;
  }
  .card[data-theme="light"]{
    --c-bg:#ffffff; --c-text:#0f1419; --c-dim:#536471; --c-blue:#1d9bf0; --c-border:#eff3f4;
  }
  .card[data-theme="dim"]{
    --c-bg:#15202b; --c-text:#f7f9f9; --c-dim:#8b98a5; --c-blue:#1d9bf0; --c-border:#38444d;
  }
  .card{background:var(--c-bg);color:var(--c-text)}

  .tw-head{display:flex;align-items:flex-start;gap:20px;margin-bottom:22px}
  .tw-avatar{width:88px;height:88px;border-radius:50%;flex:0 0 88px;overflow:hidden;background:var(--c-border);display:flex;align-items:center;justify-content:center}
  .tw-avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .tw-avatar svg{width:100%;height:100%}
  .tw-idblock{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding-top:4px}
  .tw-name{display:flex;align-items:center;gap:8px;font-weight:800;font-size:33px;line-height:1.15;letter-spacing:-.2px}
  .tw-name .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tw-badge{flex:0 0 auto;width:31px;height:31px}
  .tw-handle{color:var(--c-dim);font-size:28px;line-height:1.2;margin-top:3px}
  .tw-more{flex:0 0 auto;color:var(--c-dim);align-self:flex-start;padding-top:6px}
  .tw-more svg{width:34px;height:34px;fill:currentColor}

  .tw-body{font-size:44px;line-height:1.35;letter-spacing:-.2px;white-space:pre-wrap;word-wrap:break-word;font-weight:400}
  .tw-body .hl{color:var(--c-blue)}
  .tw-media{margin-top:26px;border-radius:22px;overflow:hidden;border:1px solid var(--c-border)}
  .tw-media img{width:100%;display:block;max-height:560px;object-fit:cover}

  .tw-meta{margin-top:26px;color:var(--c-dim);font-size:27px;line-height:1.3}
  .tw-meta .src{color:var(--c-blue)}

  .tw-divider{height:1px;background:var(--c-border);margin:26px 0}

  .tw-engage{display:flex;align-items:center;gap:44px;color:var(--c-dim)}
  .tw-stat{display:flex;align-items:center;gap:12px;font-size:27px;font-weight:500}
  .tw-stat svg{width:31px;height:31px;fill:currentColor;flex:0 0 auto}
  .tw-share{margin-left:auto}
  .tw-share svg{width:31px;height:31px;fill:var(--c-dim)}

  /* scrollbars */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a2e34;border-radius:8px;border:2px solid var(--ui-panel-2)}
  ::-webkit-scrollbar-thumb:hover{background:#353a42}

  .hidden-stage{position:fixed;left:-99999px;top:0;pointer-events:none;opacity:0}

  @media (max-width:1200px){
    .panel{width:300px;flex-basis:300px}
    .rail{width:150px;flex-basis:150px}
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></span>
      Carrossel Maker
    </div>
    <div class="topbar-actions">
      <div class="theme-seg" id="themeSeg">
        <button data-theme="dark" class="active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 01-4.4 2.26 5.4 5.4 0 01-2.4-10.4C13.06 3.24 12.53 3 12 3z"/></svg>Escuro</button>
        <button data-theme="light"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zM12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>Claro</button>
        <button data-theme="dim"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 2v14a7 7 0 000-14z"/></svg>Dim</button>
      </div>
      <button class="btn btn-ghost" id="btnExportCurrent">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5l-4.5-4.5 1.4-1.4 2.1 2.1V3h2v8.7l2.1-2.1 1.4 1.4L12 15.5zM5 19h14v2H5z"/></svg>
        Exportar slide
      </button>
      <button class="btn btn-primary" id="btnExportAll">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h18v2H3zm2 4h14v2H5zm-2 4h18v6H3v-6z"/></svg>
        Exportar tudo (ZIP)
      </button>
    </div>
  </div>

  <div class="workspace">
    <!-- Slides rail -->
    <div class="rail">
      <div class="rail-head">Slides</div>
      <div class="rail-list" id="railList"></div>
      <div style="padding:0 12px 14px">
        <button class="add-slide" id="btnAddSlide">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z"/></svg>
          Novo slide
        </button>
      </div>
    </div>

    <!-- Settings panel -->
    <div class="panel">
      <!-- Global -->
      <div class="sect">
        <div class="sect-title">Perfil</div>
        <div class="field">
          <label>Foto de perfil</label>
          <div class="file-btn" id="avatarBtn">
            <span id="avatarName">Nenhuma imagem</span>
            <label class="pick" style="cursor:pointer">Escolher<input type="file" id="avatarInput" accept="image/*" hidden></label>
            <button class="clear" id="avatarClear" title="Remover" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"/></svg></button>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Nome de exibição</label>
            <input class="inp" id="fName" value="Lucas Felix">
          </div>
          <div class="field">
            <label>Usuário</label>
            <div class="prefix-wrap"><span class="pfx">@</span><input class="inp with-prefix" id="fUser" value="lucaslfelix"></div>
          </div>
        </div>
        <div class="field">
          <label class="switch"><input type="checkbox" id="fVerified" checked><span class="track"></span><span class="lbl">Mostrar selo de verificado</span></label>
        </div>
      </div>

      <!-- Canvas -->
      <div class="sect">
        <div class="sect-title">Canvas & Texto</div>
        <div class="field">
          <label>Formato</label>
          <select class="sel" id="fCanvas">
            <option value="1080x1080">1080 × 1080 — Quadrado (feed)</option>
            <option value="1080x1350">1080 × 1350 — Retrato (4:5)</option>
            <option value="1080x1920">1080 × 1920 — Story / Reels</option>
          </select>
        </div>
        <div class="field">
          <div class="slider-head"><span>Tamanho do texto</span><span id="fSizeVal">44px</span></div>
          <input type="range" id="fSize" min="26" max="70" value="44">
        </div>
      </div>

      <!-- Content -->
      <div class="sect">
        <div class="sect-title">Conteúdo do slide <span class="mini-link" id="slideLabel">Slide 1</span></div>
        <div class="field">
          <label>Texto do post</label>
          <textarea class="inp" id="fText" placeholder="Escreva o texto do post...">O segredo não é postar mais.

É postar a coisa certa, na hora certa, pra pessoa certa.</textarea>
        </div>
        <div class="field">
          <label>Imagem no post (opcional)</label>
          <div class="file-btn" id="mediaBtn">
            <span id="mediaName">Nenhuma imagem</span>
            <label class="pick" style="cursor:pointer">Escolher<input type="file" id="mediaInput" accept="image/*" hidden></label>
            <button class="clear" id="mediaClear" title="Remover" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"/></svg></button>
          </div>
        </div>
      </div>

      <!-- Meta -->
      <div class="sect">
        <div class="sect-title">Data & Origem</div>
        <div class="field">
          <label class="switch"><input type="checkbox" id="fAutoDate"><span class="track"></span><span class="lbl">Usar data e hora atuais</span></label>
        </div>
        <div class="row">
          <div class="field"><label>Data</label><input class="inp" id="fDate" value="14 de abril, 2026"></div>
          <div class="field"><label>Hora</label><input class="inp" id="fTime" value="09h23"></div>
        </div>
        <div class="field">
          <label class="switch"><input type="checkbox" id="fShowSrc" checked><span class="track"></span><span class="lbl">Mostrar origem</span></label>
        </div>
        <div class="field"><input class="inp" id="fSrc" value="Twitter for iPhone"></div>
      </div>

      <!-- Engagement -->
      <div class="sect">
        <div class="sect-title">Engajamento <span class="mini-link" id="btnRandom">Aleatório</span></div>
        <div class="field">
          <label class="switch"><input type="checkbox" id="fShowEng" checked><span class="track"></span><span class="lbl">Mostrar métricas</span></label>
        </div>
        <div class="row">
          <div class="field"><label>Views</label><input class="inp" id="fViews" value="2.5M"></div>
          <div class="field"><label>Respostas</label><input class="inp" id="fReplies" value="2,954"></div>
        </div>
        <div class="row">
          <div class="field"><label>Reposts</label><input class="inp" id="fReposts" value="10.5K"></div>
          <div class="field"><label>Curtidas</label><input class="inp" id="fLikes" value="56.5K"></div>
        </div>
      </div>
    </div>

    <!-- Stage -->
    <div class="stage" id="stage">
      <div class="stage-label" id="stageLabel">Slide 1 · 1080 × 1080</div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="card" id="card" data-theme="dark"></div>
      </div>
    </div>
  </div>
</div>

<div class="hidden-stage" id="hiddenStage"></div>

<script>
/* ---------------- ICON library (real X/Twitter paths) ---------------- */
const ICONS = {

/* ---------------- State ---------------- */
const state = {
  theme:'dark',
  canvas:'1080x1080',
  fontSize:44,
  name:'Lucas Felix',
  user:'lucaslfelix',
  avatar:null,
  verified:true,
  autoDate:false,
  date:'14 de abril, 2026',
  time:'09h23',
  showSrc:true,
  src:'Twitter for iPhone',
  showEng:true,
  views:'2.5M', replies:'2,954', reposts:'10.5K', likes:'56.5K',
  slides:[
    { text:'O segredo não é postar mais.\n\nÉ postar a coisa certa, na hora certa, pra pessoa certa.', image:null }
  ],
  current:0
};

/* ---------------- Helpers ---------------- */
const $ = s => document.querySelector(s);
const CANVAS_H = { '1080x1080':1080, '1080x1350':1350, '1080x1920':1920 };

function escapeHTML(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Turn @mentions, #hashtags and links blue like on X
function formatBody(text){
  let t = escapeHTML(text);
  t = t.replace(/(^|\s)(@\w+)/g,'$1<span class="hl">$2</span>');
  t = t.replace(/(^|\s)(#[\wÀ-ÿ]+)/g,'$1<span class="hl">$2</span>');
  t = t.replace(/(https?:\/\/[^\s]+)/g,'<span class="hl">$1</span>');
  return t;
}

function avatarHTML(){
  return state.avatar
    ? `<img src="${state.avatar}" alt="">`
    : ICONS.defaultAvatar;
}

// Build the full-size card markup for a given slide
function cardMarkup(slide){
  const src = state.showSrc && state.src ? ` · <span class="src">${escapeHTML(state.src)}</span>` : '';
  const meta = `<div class="tw-meta">${escapeHTML(state.time)} · ${escapeHTML(state.date)}${src}</div>`;

  const media = slide.image
    ? `<div class="tw-media"><img src="${slide.image}" alt=""></div>` : '';

  const engage = state.showEng ? `
    <div class="tw-divider"></div>
    <div class="tw-engage">
      <div class="tw-stat">${ICONS.views}<span>${escapeHTML(state.views)}</span></div>
      <div class="tw-stat">${ICONS.reply}<span>${escapeHTML(state.replies)}</span></div>
      <div class="tw-stat">${ICONS.repost}<span>${escapeHTML(state.reposts)}</span></div>
      <div class="tw-stat">${ICONS.like}<span>${escapeHTML(state.likes)}</span></div>
      <div class="tw-share">${ICONS.share}</div>
    </div>` : '';

  const badge = state.verified ? ICONS.badge : '';

  return `
    <div class="tw-head">
      <div class="tw-avatar">${avatarHTML()}</div>
      <div class="tw-idblock">
        <div class="tw-name"><span class="txt">${escapeHTML(state.name)}</span>${badge}</div>
        <div class="tw-handle">@${escapeHTML(state.user)}</div>
      </div>
      <div class="tw-more">${ICONS.more}</div>
    </div>
    <div class="tw-body" style="font-size:${state.fontSize}px">${formatBody(slide.text)}</div>
    ${media}
    ${meta}
    ${engage}
  `;
}

/* ---------------- Render ---------------- */
function renderCard(){
  const card = $('#card');
  const [w,h] = state.canvas.split('x').map(Number);
  card.style.width = w+'px';
  card.style.height = h+'px';
  card.dataset.theme = state.theme;
  card.innerHTML = cardMarkup(state.slides[state.current]);
  fitStage();
}

function fitStage(){
  const stage = $('#stage');
  const wrap = $('#canvasWrap');
  const [w,h] = state.canvas.split('x').map(Number);
  const pad = 64;
  const availW = stage.clientWidth - pad*2;
  const availH = stage.clientHeight - pad*2;
  const scale = Math.min(availW/w, availH/h, 1);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = w+'px';
  wrap.style.height = h+'px';
}

function renderRail(){
  const list = $('#railList');
  list.innerHTML = '';
  state.slides.forEach((sl,i)=>{
    const chip = document.createElement('div');
    chip.className = 'slide-chip'+(i===state.current?' active':'');
    chip.innerHTML = `<span class="idx">${i+1}</span>
      ${state.slides.length>1?`<button class="del" data-i="${i}" title="Excluir"><svg viewBox="0 0 24 24"><path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"/></svg></button>`:''}
      <div class="thumb" id="thumb-${i}"></div>`;
    chip.addEventListener('click',(e)=>{
      if(e.target.closest('.del')) return;
      state.current = i; syncPanel(); renderCard(); renderRail();
    });
    list.appendChild(chip);
    // mini thumbnail
    const thumb = chip.querySelector('.thumb');
    const [w,h] = state.canvas.split('x').map(Number);
    const mini = document.createElement('div');
    mini.className='card';
    mini.dataset.theme = state.theme;
    mini.style.width = w+'px'; mini.style.height = h+'px';
    mini.style.transformOrigin='top left';
    const chipW = chip.clientWidth || 166;
    mini.style.transform = `scale(${chipW/w})`;
    mini.innerHTML = cardMarkup(state.slides[i]);
    thumb.appendChild(mini);
  });
  list.querySelectorAll('.del').forEach(b=>{
    b.addEventListener('click',()=>{
      const i = +b.dataset.i;
      state.slides.splice(i,1);
      if(state.current>=state.slides.length) state.current=state.slides.length-1;
      syncPanel(); renderCard(); renderRail();
    });
  });
  $('#slideLabel').textContent = 'Slide '+(state.current+1);
  const [cw,ch] = state.canvas.split('x');
  $('#stageLabel').textContent = `Slide ${state.current+1} · ${cw} × ${ch}`;
}

// Sync the per-slide fields when switching slides
function syncPanel(){
  const sl = state.slides[state.current];
  $('#fText').value = sl.text;
  const has = !!sl.image;
  $('#mediaName').textContent = has?'Imagem adicionada':'Nenhuma imagem';
  $('#mediaBtn').classList.toggle('has-file',has);
  $('#mediaClear').style.display = has?'block':'none';
}

/* ---------------- Bindings ---------------- */
function bind(){
  // theme
  $('#themeSeg').addEventListener('click',e=>{
    const b = e.target.closest('button'); if(!b)return;
    state.theme = b.dataset.theme;
    document.querySelectorAll('#themeSeg button').forEach(x=>x.classList.toggle('active',x===b));
    renderCard(); renderRail();
  });

  // profile
  $('#fName').addEventListener('input',e=>{state.name=e.target.value;renderCard();renderRail();});
  $('#fUser').addEventListener('input',e=>{state.user=e.target.value.replace(/^@/,'');renderCard();renderRail();});
  $('#fVerified').addEventListener('change',e=>{state.verified=e.target.checked;renderCard();renderRail();});

  // avatar
  $('#avatarInput').addEventListener('change',e=>readImage(e,dataUrl=>{
    state.avatar=dataUrl;
    $('#avatarName').textContent='Imagem carregada';
    $('#avatarBtn').classList.add('has-file');
    $('#avatarClear').style.display='block';
    renderCard();renderRail();
  }));
  $('#avatarClear').addEventListener('click',()=>{
    state.avatar=null;$('#avatarName').textContent='Nenhuma imagem';
    $('#avatarBtn').classList.remove('has-file');$('#avatarClear').style.display='none';
    $('#avatarInput').value='';renderCard();renderRail();
  });

  // canvas & size
  $('#fCanvas').addEventListener('change',e=>{state.canvas=e.target.value;renderCard();renderRail();});
  $('#fSize').addEventListener('input',e=>{state.fontSize=+e.target.value;$('#fSizeVal').textContent=e.target.value+'px';renderCard();renderRail();});

  // slide text
  $('#fText').addEventListener('input',e=>{state.slides[state.current].text=e.target.value;renderCard();renderRail();});

  // slide media
  $('#mediaInput').addEventListener('change',e=>readImage(e,dataUrl=>{
    state.slides[state.current].image=dataUrl;syncPanel();renderCard();renderRail();
  }));
  $('#mediaClear').addEventListener('click',()=>{
    state.slides[state.current].image=null;$('#mediaInput').value='';syncPanel();renderCard();renderRail();
  });

  // meta
  $('#fAutoDate').addEventListener('change',e=>{
    state.autoDate=e.target.checked;
    if(state.autoDate){
      const now=new Date();
      const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
      state.date=`${now.getDate()} de ${meses[now.getMonth()]}, ${now.getFullYear()}`;
      state.time=`${String(now.getHours()).padStart(2,'0')}h${String(now.getMinutes()).padStart(2,'0')}`;
      $('#fDate').value=state.date;$('#fTime').value=state.time;
    }
    $('#fDate').disabled=state.autoDate;$('#fTime').disabled=state.autoDate;
    renderCard();renderRail();
  });
  $('#fDate').addEventListener('input',e=>{state.date=e.target.value;renderCard();renderRail();});
  $('#fTime').addEventListener('input',e=>{state.time=e.target.value;renderCard();renderRail();});
  $('#fShowSrc').addEventListener('change',e=>{state.showSrc=e.target.checked;renderCard();renderRail();});
  $('#fSrc').addEventListener('input',e=>{state.src=e.target.value;renderCard();renderRail();});

  // engagement
  $('#fShowEng').addEventListener('change',e=>{state.showEng=e.target.checked;renderCard();renderRail();});
  ['fViews:views','fReplies:replies','fReposts:reposts','fLikes:likes'].forEach(pair=>{
    const [id,key]=pair.split(':');
    $('#'+id).addEventListener('input',e=>{state[key]=e.target.value;renderCard();renderRail();});
  });
  $('#btnRandom').addEventListener('click',()=>{
    const fmt=n=> n>=1e6?(n/1e6).toFixed(1).replace('.0','')+'M': n>=1e3?(n/1e3).toFixed(1).replace('.0','')+'K': n.toLocaleString('en-US');
    const views=Math.floor(80000+Math.random()*4000000);
    state.views=fmt(views);
    state.likes=fmt(Math.floor(views*(0.01+Math.random()*0.05)));
    state.reposts=fmt(Math.floor(views*(0.002+Math.random()*0.01)));
    state.replies=Math.floor(views*(0.0008+Math.random()*0.004)).toLocaleString('en-US');
    $('#fViews').value=state.views;$('#fLikes').value=state.likes;
    $('#fReposts').value=state.reposts;$('#fReplies').value=state.replies;
    renderCard();renderRail();
  });

  // slides
  $('#btnAddSlide').addEventListener('click',()=>{
    state.slides.push({text:'Novo slide.\n\nEscreva aqui o texto deste post.',image:null});
    state.current=state.slides.length-1;syncPanel();renderCard();renderRail();
  });

  // export
  $('#btnExportCurrent').addEventListener('click',exportCurrent);
  $('#btnExportAll').addEventListener('click',exportAll);

  window.addEventListener('resize',fitStage);
}

function readImage(e,cb){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>cb(r.result);
  r.readAsDataURL(f);
}

/* ---------------- Export (crisp, no aliasing) ---------------- */
async function nodeToPng(slideIndex){
  const [w,h]=state.canvas.split('x').map(Number);
  const holder=$('#hiddenStage');
  const node=document.createElement('div');
  node.className='card';
  node.dataset.theme=state.theme;
  node.style.width=w+'px';
  node.style.height=h+'px';
  node.innerHTML=cardMarkup(state.slides[slideIndex]);
  holder.appendChild(node);
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,60)); // let images/layout settle
  const dataUrl=await htmlToImage.toPng(node,{
    width:w, height:h, pixelRatio:2, cacheBust:true,
    style:{margin:'0'}
  });
  holder.removeChild(node);
  return dataUrl;
}

async function exportCurrent(){
  const btn=$('#btnExportCurrent'); btn.disabled=true;
  try{
    const url=await nodeToPng(state.current);
    const a=document.createElement('a');
    a.href=url; a.download=`slide-${state.current+1}.png`; a.click();
  }catch(err){console.error(err);alert('Falha ao exportar. Tente novamente.');}
  btn.disabled=false;
}

async function exportAll(){
  const btn=$('#btnExportAll'); btn.disabled=true;
  const original=btn.innerHTML;
  try{
    const zip=new JSZip();
    for(let i=0;i<state.slides.length;i++){
      btn.innerHTML=`Gerando ${i+1}/${state.slides.length}...`;
      const url=await nodeToPng(i);
      zip.file(`slide-${i+1}.png`, url.split(',')[1], {base64:true});
    }
    const blob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='carrossel.zip'; a.click();
  }catch(err){console.error(err);alert('Falha ao exportar o ZIP. Tente novamente.');}
  btn.innerHTML=original; btn.disabled=false;
}

/* ---------------- Init ---------------- */
bind();
syncPanel();
renderCard();
renderRail();
window.addEventListener('load',()=>{renderCard();renderRail();});
</script>
